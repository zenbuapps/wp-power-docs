openapi: 3.0.3
info:
  title: Power Docs REST API
  description: |
    Power Docs 知識變現套件的 REST API。

    Power Docs 本身僅註冊一個自訂 endpoint（`/power-docs/v1/users`），
    其餘 CRUD 操作透過 Powerhouse 提供的通用 REST API 進行（`/powerhouse/v1/posts`、`/powerhouse/v1/products`），
    Power Docs 透過 WordPress filter hooks 擴充這些 API 的回傳欄位。

    ## 錯誤碼對應規則
    - **400** = 前置（參數）Rules 驗證失敗
    - **403** = 前置（狀態）Rules 不符（權限不足）
    - **404** = 資源找不到

    ## 認證
    所有管理端 API 需要 WordPress 登入 Cookie 加上 `X-WP-Nonce` Header。
  version: "1.2.7"

servers:
  - url: /wp-json/power-docs/v1
    description: Power Docs 自訂 API
  - url: /wp-json/powerhouse/v1
    description: Powerhouse 通用 API（Power Docs 透過 filter 擴充）

tags:
  - name: Users
    description: 用戶查詢（Power Docs 自訂 endpoint）
  - name: Docs
    description: 知識庫 CRUD（透過 Powerhouse posts API）
  - name: Products
    description: 商品綁定管理（透過 Powerhouse products API）

components:
  securitySchemes:
    wpNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress REST API nonce，透過 wp_create_nonce('wp_rest') 產生

  schemas:
    UserSummary:
      type: object
      properties:
        id:
          type: integer
          description: 用戶 ID
        user_login:
          type: string
          description: 帳號
        user_email:
          type: string
          description: 電子信箱
        display_name:
          type: string
          description: 顯示名稱
        user_nicename:
          type: string
          description: 別名
        granted_docs:
          type: array
          description: 已授權的知識庫清單（需透過 meta_keys 請求）
          items:
            $ref: '#/components/schemas/GrantedDoc'

    GrantedDoc:
      type: object
      properties:
        id:
          type: integer
          description: 知識庫 post ID
        title:
          type: string
          description: 知識庫標題
        expire_date:
          type: string
          description: 到期日期

    DocBase:
      type: object
      properties:
        id:
          type: string
          description: 文章 ID
        name:
          type: string
          description: 標題
        slug:
          type: string
          description: 網址別名
        status:
          type: string
          enum: [publish, draft, pending, private]
          description: 發佈狀態
        date_created:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
        menu_order:
          type: integer
          description: 排序順序
        permalink:
          type: string
          description: 前台連結
        parent_id:
          type: string
          description: 父文章 ID
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
          description: 縮圖
        bg_images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
          description: 背景圖（僅根知識庫）
        editor:
          type: string
          enum: [power-editor, elementor, ""]
          description: 編輯器類型
        need_access:
          type: string
          enum: ["yes", "no", ""]
          description: 是否需要購買授權（僅根知識庫）
        pd_keywords:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
          description: 搜尋關鍵字（僅根知識庫）
        pd_keywords_label:
          type: string
          description: 關鍵字標籤文字（僅根知識庫）
        unauthorized_redirect_url:
          type: string
          description: 未授權跳轉網址（僅根知識庫）

    DocDetail:
      allOf:
        - $ref: '#/components/schemas/DocBase'
        - type: object
          properties:
            description:
              type: string
              description: 文章內容（post_content）
            short_description:
              type: string
              description: 摘要
            children:
              type: array
              items:
                $ref: '#/components/schemas/DocBase'
              description: 子章節

    Image:
      type: object
      properties:
        id:
          type: integer
          description: Attachment ID
        url:
          type: string
          description: 圖片 URL
        width:
          type: integer
        height:
          type: integer

    ProductBase:
      type: object
      properties:
        id:
          type: string
          description: 商品 ID
        name:
          type: string
          description: 商品名稱
        type:
          type: string
          enum: [simple, grouped, external, variable, variation, subscription, variable-subscription, subscription_variation]
          description: 商品類型
        status:
          type: string
          enum: [publish, draft, pending, private]
        bound_docs_data:
          type: array
          items:
            $ref: '#/components/schemas/BoundDocData'
          description: 已綁定的知識庫授權資料
        children:
          type: array
          items:
            $ref: '#/components/schemas/ProductBase'
          description: 商品變體（僅可變商品）

    BoundDocData:
      type: object
      properties:
        id:
          type: integer
          description: 知識庫 post ID
        limit_type:
          type: string
          enum: [unlimited, fixed, follow_subscription]
          description: 期限類型
        limit_value:
          type: integer
          description: 期限天數（limit_type=fixed 時使用）
        limit_unit:
          type: string
          enum: [day, month, year]
          description: 期限單位

    SortRequest:
      type: object
      required:
        - from_tree
        - to_tree
      properties:
        from_tree:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              parent_id:
                type: string
              order:
                type: integer
          description: 排序前的樹狀結構
        to_tree:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              parent_id:
                type: string
              order:
                type: integer
          description: 排序後的樹狀結構

    PaginationHeaders:
      type: object
      description: 分頁資訊（透過 Response Header 回傳）
      properties:
        X-WP-Total:
          type: string
          description: 總筆數
        X-WP-TotalPages:
          type: string
          description: 總頁數
        X-WP-CurrentPage:
          type: string
          description: 目前頁碼
        X-WP-PageSize:
          type: string
          description: 每頁筆數

security:
  - wpNonce: []

paths:
  /users:
    get:
      tags: [Users]
      summary: 查詢用戶列表
      operationId: GetUsers
      description: |
        查詢用戶列表，支援搜尋及依已授權知識庫篩選。
        分頁資訊透過 Response Header 回傳。
      parameters:
        - name: posts_per_page
          in: query
          schema:
            type: integer
            default: 20
          description: 每頁筆數
        - name: paged
          in: query
          schema:
            type: integer
            default: 1
          description: 頁碼
        - name: s
          in: query
          schema:
            type: string
          description: 搜尋關鍵字（ID、帳號、Email、暱稱、顯示名稱）
        - name: orderby
          in: query
          schema:
            type: string
            default: ID
          description: 排序欄位
        - name: order
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
          description: 排序方向
        - name: granted_docs[]
          in: query
          schema:
            type: array
            items:
              type: string
          description: 篩選同時擁有指定知識庫授權的用戶
        - name: meta_keys[]
          in: query
          schema:
            type: array
            items:
              type: string
          description: 要回傳的額外 meta 欄位（如 granted_docs）
      responses:
        '200':
          description: 用戶列表
          headers:
            X-WP-Total:
              schema:
                type: string
              description: 總筆數
            X-WP-TotalPages:
              schema:
                type: string
              description: 總頁數
            X-WP-CurrentPage:
              schema:
                type: string
              description: 目前頁碼
            X-WP-PageSize:
              schema:
                type: string
              description: 每頁筆數
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'

  # ===== 以下為 Powerhouse 通用 API，Power Docs 透過 filter 擴充 =====

  /posts:
    get:
      tags: [Docs]
      summary: 查詢知識庫列表
      operationId: GetDocs
      description: |
        透過 Powerhouse 通用 posts API 查詢知識庫列表。
        需帶 post_type=pd_doc 篩選。
        Server: /wp-json/powerhouse/v1
      parameters:
        - name: post_type
          in: query
          required: true
          schema:
            type: string
            enum: [pd_doc]
        - name: posts_per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: paged
          in: query
          schema:
            type: integer
            default: 1
        - name: meta_keys[]
          in: query
          schema:
            type: array
            items:
              type: string
          description: 額外 meta 欄位
      responses:
        '200':
          description: 知識庫列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocBase'

    post:
      tags: [Docs]
      summary: 建立知識庫/章節
      operationId: CreateDoc
      description: |
        透過 Powerhouse 通用 posts API 建立知識庫或章節。
        Server: /wp-json/powerhouse/v1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - post_type
                - post_title
              properties:
                post_type:
                  type: string
                  enum: [pd_doc]
                post_title:
                  type: string
                post_parent:
                  type: integer
                  default: 0
                status:
                  type: string
                  enum: [publish, draft]
                  default: draft
      responses:
        '200':
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocDetail'
        '403':
          description: 權限不足

  /posts/{id}:
    get:
      tags: [Docs]
      summary: 查詢知識庫詳情
      operationId: GetDocDetail
      description: |
        透過 Powerhouse 通用 posts API 查詢知識庫詳情。
        Server: /wp-json/powerhouse/v1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: with_description
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: meta_keys[]
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: 知識庫詳情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocDetail'
        '404':
          description: 文章不存在

    patch:
      tags: [Docs]
      summary: 更新知識庫/章節
      operationId: UpdateDoc
      description: |
        透過 Powerhouse 通用 posts API 更新知識庫或章節。
        支援 multipart/form-data 上傳背景圖。
        Server: /wp-json/powerhouse/v1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                post_title:
                  type: string
                post_content:
                  type: string
                status:
                  type: string
                  enum: [publish, draft, pending, private]
                need_access:
                  type: string
                  enum: ["yes", "no"]
                bg_images:
                  oneOf:
                    - type: string
                      format: binary
                      description: 上傳檔案
                    - type: string
                      enum: ["delete"]
                      description: 刪除現有圖片
                pd_keywords:
                  type: string
                  description: JSON 字串
                pd_keywords_label:
                  type: string
                unauthorized_redirect_url:
                  type: string
                editor:
                  type: string
                  enum: [power-editor, elementor]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocDetail'
        '403':
          description: 權限不足
        '404':
          description: 文章不存在

    delete:
      tags: [Docs]
      summary: 刪除知識庫/章節
      operationId: DeleteDoc
      description: |
        透過 Powerhouse 通用 posts API 刪除知識庫或章節。
        Server: /wp-json/powerhouse/v1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 刪除成功
        '403':
          description: 權限不足
        '404':
          description: 文章不存在

  /posts/sort:
    post:
      tags: [Docs]
      summary: 排序章節
      operationId: SortPosts
      description: |
        透過 Powerhouse 通用 posts API 更新章節排序。
        Server: /wp-json/powerhouse/v1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SortRequest'
      responses:
        '200':
          description: 排序成功
        '403':
          description: 權限不足

  /products:
    get:
      tags: [Products]
      summary: 查詢商品列表
      operationId: GetProducts
      description: |
        透過 Powerhouse 通用 products API 查詢商品列表。
        帶 meta_keys[]=bound_docs_data 以取得知識庫綁定資料。
        Server: /wp-json/powerhouse/v1
      parameters:
        - name: posts_per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: paged
          in: query
          schema:
            type: integer
            default: 1
        - name: meta_keys[]
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: 必須包含 bound_docs_data
      responses:
        '200':
          description: 商品列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductBase'
