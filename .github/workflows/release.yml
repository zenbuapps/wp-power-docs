name: Release

# Tag push → build → zip → GitHub Release
# 建議的 tag 格式：v1.2.10, v1.3.0 等
on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 強制 Git 使用 HTTPS（避免 plugin 安裝 SSH 失敗）
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: 設定 pnpm
        uses: pnpm/action-setup@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 設定 PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: 安裝 Node 依賴
        run: pnpm install --frozen-lockfile

      - name: 安裝 Composer 依賴（production，跳過 dev 套件）
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: 建置前端
        run: pnpm run build

      - name: 產生 release zip
        id: zip
        env:
          # zip.cjs 讀取 .env 檔；CI 環境沒有 .env，建立最小空檔避免 env-cmd 失敗
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          touch .env
          pnpm run zip
          ZIP_PATH=$(ls release/*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_PATH" ]; then
            echo "::error::未找到 release/*.zip 產物"
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> $GITHUB_OUTPUT
          echo "✅ 產生 zip: $ZIP_PATH"
          ls -lah "$ZIP_PATH"

      - name: 建立 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.zip_path }}
